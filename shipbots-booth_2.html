<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Book a Meeting — ShipBots</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06091A;
      --nav: #080C1F;
      --accent: #2563EB;
      --accent-light: #3B82F6;
      --text: #FFFFFF;
      --muted: #94A3B8;
      --border: rgba(255,255,255,0.08);
      --header-h: 64px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--nav);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }

    .logo img { height: 28px; display: block; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .tagline { font-size: 13px; color: var(--muted); font-weight: 500; }

    .pill {
      background: rgba(37,99,235,0.15);
      border: 1px solid rgba(37,99,235,0.3);
      color: var(--accent-light);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      letter-spacing: 0.03em;
    }

    #calendly-embed {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0; bottom: 0;
      width: 100%;
      height: calc(100vh - var(--header-h));
      overflow: hidden;
    }

    #calendly-embed .calendly-inline-widget,
    #calendly-embed iframe {
      width: 100% !important;
      height: 100% !important;
      min-width: unset !important;
      border: none !important;
    }

    #success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(6,9,26,0.92);
      backdrop-filter: blur(8px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    #success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563EB, #1D4ED8);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 0 0 12px rgba(37,99,235,0.12), 0 0 0 24px rgba(37,99,235,0.06);
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .check-ring svg {
      width: 38px; height: 38px;
      stroke: #fff; stroke-width: 2.5;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    .success-title { font-size: 30px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
    .success-sub { font-size: 16px; color: var(--muted); margin-bottom: 36px; }

    .bar-track {
      width: 260px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 99px; overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #2563EB, #60A5FA);
      border-radius: 99px;
      width: 100%;
      animation: drain 4s linear forwards;
    }

    @keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }

    .reset-label { margin-top: 12px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="https://shipbots.com" target="_blank">
      <img src="https://cdn.prod.website-files.com/65e089dbff2dce1eb85a78dc/668fabe175a3859b5db23140_logo.svg" alt="ShipBots" />
    </a>
    <div class="header-right">
      <span class="tagline">Book a meeting with Mikey</span>
      <span class="pill">Live at the Event</span>
    </div>
  </header>

  <div id="calendly-embed"></div>

  <div id="success-overlay">
    <div class="check-ring">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">You're booked! 🎉</div>
    <div class="success-sub">Check your email for confirmation.<br>Resetting for the next person...</div>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="reset-label">Resetting in 4 seconds</div>
  </div>

  <script>
    function initCalendly() {
      Calendly.initInlineWidget({
        url: 'https://calendly.com/shipbots/mikey?hide_gdpr_banner=1&background_color=06091A&text_color=FFFFFF&primary_color=2563EB',
        parentElement: document.getElementById('calendly-embed'),
      });
    }

    // Load Calendly script dynamically — init only after it's ready
    var script = document.createElement('script');
    script.src = 'https://assets.calendly.com/assets/external/widget.js';
    script.onload = function() { initCalendly(); };
    document.head.appendChild(script);

    window.addEventListener('message', function(e) {
      if (e.data && e.data.event === 'calendly.event_scheduled') {
        showSuccess();
      }
    });

    function showSuccess() {
      var overlay = document.getElementById('success-overlay');
      var track = overlay.querySelector('.bar-track');
      track.innerHTML = '<div class="bar-fill"></div>';
      overlay.classList.add('show');

      setTimeout(function() {
        overlay.classList.remove('show');
        document.getElementById('calendly-embed').innerHTML = '';
        initCalendly();
      }, 4000);
    }
  </script>

</body>
</html>
