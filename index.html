<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Book a Meeting — ShipBots</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F4F5;
      --nav: #FFFFFF;
      --text: #18181B;
      --muted: #71717A;
      --border: #E4E4E7;
      --accent: #2563EB;
      --header-h: 64px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--nav);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }

    .logo img { height: 26px; display: block; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .tagline { font-size: 13px; color: var(--muted); font-weight: 400; }

    .pill {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 99px;
    }

    #calendly-embed {
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0; bottom: 0;
      width: 100%;
      height: calc(100vh - var(--header-h));
      overflow: hidden;
      background: var(--bg);
    }

    #calendly-embed .calendly-inline-widget,
    #calendly-embed iframe {
      width: 100% !important;
      height: 100% !important;
      min-width: unset !important;
      border: none !important;
    }

    #success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(244,244,245,0.96);
      backdrop-filter: blur(8px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    #success-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .check-ring svg {
      width: 34px; height: 34px;
      stroke: #fff; stroke-width: 2.5;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    .success-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .success-sub { font-size: 15px; color: var(--muted); margin-bottom: 32px; line-height: 1.5; }

    .bar-track {
      width: 240px; height: 3px;
      background: var(--border);
      border-radius: 99px; overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 100%;
      animation: drain 4s linear forwards;
    }

    @keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }

    .reset-label { margin-top: 10px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="https://shipbots.com" target="_blank">
      <img src="https://cdn.prod.website-files.com/65e089dbff2dce1eb85a78dc/668fabe175a3859b5db23140_logo.svg" alt="ShipBots" />
    </a>
    <div class="header-right">
      <span class="tagline">Book a meeting with Mikey</span>
      <span class="pill">Live at the Event</span>
    </div>
  </header>

  <div id="calendly-embed"></div>

  <div id="success-overlay">
    <div class="check-ring">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="success-title">You're booked! 🎉</div>
    <div class="success-sub">Check your email for confirmation.<br>Resetting for the next person...</div>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="reset-label">Resetting in 4 seconds</div>
  </div>

  <script>
    function initCalendly() {
      Calendly.initInlineWidget({
        url: 'https://calendly.com/shipbots/mikey?hide_gdpr_banner=1',
        parentElement: document.getElementById('calendly-embed'),
      });
    }

    var script = document.createElement('script');
    script.src = 'https://assets.calendly.com/assets/external/widget.js';
    script.onload = function() { initCalendly(); };
    document.head.appendChild(script);

    window.addEventListener('message', function(e) {
      if (e.data && e.data.event === 'calendly.event_scheduled') {
        showSuccess();
      }
    });

    function showSuccess() {
      var overlay = document.getElementById('success-overlay');
      overlay.querySelector('.bar-track').innerHTML = '<div class="bar-fill"></div>';
      overlay.classList.add('show');

      // Full page reload — only way to guarantee zero cached autofill data
      setTimeout(function() {
        window.location.reload(true);
      }, 4000);
    }
  </script>

</body>
</html>
